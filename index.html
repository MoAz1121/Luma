<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kamer Decoratie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5e6d5; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }

    /* ── Animated bokeh background ── */
    #bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(72px); animation: blobanim 20s ease-in-out infinite alternate;
    }
    .b1{width:620px;height:620px;top:-18%;left:-12%;background:radial-gradient(circle,#ffbe90,transparent);animation-duration:19s;animation-delay:0s}
    .b2{width:500px;height:500px;bottom:-12%;right:-10%;background:radial-gradient(circle,#ffacc4,transparent);animation-duration:23s;animation-delay:-8s}
    .b3{width:420px;height:420px;top:18%;right:4%;background:radial-gradient(circle,#ffe08a,transparent);animation-duration:17s;animation-delay:-4s}
    .b4{width:680px;height:340px;top:58%;left:10%;background:radial-gradient(circle,#ffc8a8,transparent);animation-duration:26s;animation-delay:-12s}
    .b5{width:300px;height:300px;top:5%;left:40%;background:radial-gradient(circle,#d4b8f0,transparent);animation-duration:21s;animation-delay:-6s}
    @keyframes blobanim {
      0%  {opacity:.52;transform:translate(0,0) scale(1)}
      33% {opacity:.65;transform:translate(22px,-18px) scale(1.09)}
      66% {opacity:.48;transform:translate(-16px,22px) scale(.92)}
      100%{opacity:.58;transform:translate(12px,28px) scale(1.05)}
    }
    #vig { position:fixed;inset:0;z-index:3;pointer-events:none;
           background:radial-gradient(ellipse at 50% 45%,transparent 48%,rgba(160,100,70,.16) 100%); }

    /* ── Canvas ── */
    #c { position:fixed;top:0;left:0;right:0;bottom:110px;z-index:2;touch-action:none;cursor:default; }

    /* ── Room tabs ── */
    #tabs {
      position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:11;
      display:flex;gap:4px;padding:6px 10px 0;
      background:rgba(255,255,255,.72);backdrop-filter:blur(10px);
      border-radius:0 0 14px 14px;border:1.5px solid rgba(240,220,205,.8);border-top:none;
    }
    .tab {
      padding:5px 14px;border-radius:8px;border:none;cursor:pointer;
      font-size:12px;font-weight:600;background:transparent;color:#a08878;
      touch-action:manipulation;
      max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .tab.active { background:rgba(196,149,106,.22);color:#7a5030; }
    .tab:hover  { background:rgba(196,149,106,.12); }

    /* ── Top bar buttons ── */
    #undo,#roomBtn,#rot,#dup,#del {
      position:fixed;top:44px;z-index:10;
      color:white;border:none;border-radius:12px;
      padding:10px 16px;cursor:pointer;
      font-size:13px;font-weight:600;
      touch-action:manipulation;backdrop-filter:blur(6px);
    }
    #undo   { left:16px;  background:rgba(160,140,120,.75); }
    #undo:hover { background:rgba(140,120,100,.85); }
    #roomBtn{ left:110px; background:rgba(120,170,130,.82); }
    #roomBtn:hover { background:rgba(100,150,110,.9); }
    #rot    { right:226px;background:rgba(100,155,185,.85);display:none; }
    #rot:hover { background:rgba(80,130,165,.9); }
    #dup    { right:136px;background:rgba(150,130,200,.85);display:none; }
    #dup:hover { background:rgba(130,110,180,.9); }
    #del    { right:16px; background:rgba(215,100,100,.85);display:none; }
    #del:hover { background:rgba(190,80,80,.9); }

    /* ── Hint pill ── */
    #hint {
      position:fixed;top:44px;left:50%;transform:translateX(-50%);z-index:10;
      background:rgba(255,255,255,.88);backdrop-filter:blur(10px);
      padding:8px 20px;border-radius:20px;
      font-size:13px;color:#8a7060;
      border:1.5px solid rgba(232,213,196,.8);
      pointer-events:none;white-space:nowrap;
    }

    /* ── Room panel ── */
    #roompanel {
      position:fixed;top:84px;left:16px;z-index:12;
      background:rgba(255,255,255,.96);backdrop-filter:blur(14px);
      border-radius:16px;border:1.5px solid rgba(240,220,205,.9);
      padding:14px 16px;display:none;flex-direction:column;gap:12px;
      box-shadow:0 6px 28px rgba(160,120,90,.22);
      touch-action:manipulation;
    }
    .rpsw {
      width:32px;height:32px;border-radius:50%;
      border:2.5px solid transparent;cursor:pointer;
      transition:border-color .12s,transform .12s;
      touch-action:manipulation;
    }
    .rpsw:hover  { transform:scale(1.12); }
    .rpsw.active { border-color:rgba(0,0,0,.5);transform:scale(1.2); }

    /* ── Inventory ── */
    #inv {
      position:fixed;bottom:0;left:0;right:0;height:110px;z-index:10;
      background:rgba(255,255,255,.94);backdrop-filter:blur(14px);
      border-top:2px solid rgba(240,224,210,.9);
      display:flex;align-items:center;
      gap:10px;padding:8px 14px;overflow-x:auto;touch-action:pan-x;
    }
    #inv::-webkit-scrollbar{height:4px}
    #inv::-webkit-scrollbar-thumb{background:#ddc8b8;border-radius:2px}

    .card {
      min-width:82px;height:96px;flex-shrink:0;
      background:#fdf8f5;border-radius:14px;border:2px solid #ead8c8;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;padding:6px 4px 5px;cursor:pointer;
      transition:transform .15s,border-color .15s,box-shadow .15s;
      touch-action:manipulation;user-select:none;
    }
    .card:active{transform:scale(.93)}
    .card.sel{transform:translateY(-7px);border-color:#c4956a;box-shadow:0 8px 20px rgba(196,149,106,.35);background:#fff9f4}
    .pimg{width:62px;height:62px;border-radius:8px;display:block;object-fit:contain}
    .lb{font-size:11px;color:#7a6858;font-weight:500;text-align:center}

    /* ── Color row ── */
    #colorrow {
      position:fixed;bottom:118px;left:50%;transform:translateX(-50%);
      background:rgba(255,255,255,.94);backdrop-filter:blur(12px);
      border-radius:22px;border:1.5px solid rgba(240,220,205,.9);
      padding:8px 16px;z-index:10;
      display:none;gap:10px;align-items:center;
      box-shadow:0 4px 16px rgba(180,140,110,.18);
    }
    .crdot {
      width:30px;height:30px;border-radius:50%;
      border:2.5px solid transparent;cursor:pointer;
      transition:border-color .12s,transform .12s;touch-action:manipulation;
    }
    .crdot:hover{transform:scale(1.1)}
    .crdot.active{border-color:rgba(0,0,0,.5);transform:scale(1.2)}

    /* ── Rename modal ── */
    #renameModal {
      display:none;position:fixed;inset:0;z-index:20;
      background:rgba(0,0,0,.38);
      align-items:center;justify-content:center;
    }
    #renameBox {
      background:rgba(255,255,255,.98);border-radius:18px;
      border:1.5px solid rgba(240,220,205,.9);
      padding:20px 22px;
      display:flex;flex-direction:column;gap:14px;
      box-shadow:0 8px 32px rgba(160,120,90,.28);
      min-width:260px;max-width:320px;width:calc(100vw - 48px);
    }
    #renameTitle { font-size:14px;font-weight:700;color:#7a5030; }
    #renameInput {
      font-size:15px;padding:10px 14px;border-radius:12px;
      border:1.5px solid #dcc8b8;background:#fdf8f5;color:#5a4030;
      outline:none;width:100%;font-family:inherit;
    }
    #renameInput:focus { border-color:#c4956a; }
    #renameBtns { display:flex;gap:8px;justify-content:flex-end; }
    #renameBtns button {
      padding:9px 18px;border-radius:10px;border:none;
      font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;
    }
    #renameCancel  { background:#f0e8e0;color:#8a7060; }
    #renameConfirm { background:rgba(196,149,106,.9);color:white; }

    /* ── Error ── */
    #err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99;
         background:#fff;padding:24px 32px;border-radius:16px;
         border:2px solid #e88080;font-size:14px;color:#c05050;text-align:center;display:none}

    /* ── Mobile layout ≤600px ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      /* Tabs: tighter spacing */
      #tabs { gap: 2px; padding: 4px 8px 0; }
      .tab  { padding: 5px 10px; font-size: 11px; max-width: 80px; }

      /* Action buttons → 44×44 icon-only pills, one non-overlapping row */
      #undo, #roomBtn, #rot, #dup, #del {
        width: 44px; height: 44px;
        padding: 0; font-size: 0;
        display: flex; align-items: center; justify-content: center;
        border-radius: 12px; top: 42px;
      }
      #undo    { left: 8px;  }
      #undo::before    { content: '↩'; font-size: 22px; }
      #roomBtn { left: 60px; }
      #roomBtn::before { content: '🏠'; font-size: 22px; }
      #rot     { right: 112px; }
      #rot::before     { content: '↻'; font-size: 22px; }
      #dup     { right: 60px;  }
      #dup::before     { content: '📋'; font-size: 22px; }
      #del     { right: 8px;  }
      #del::before     { content: '🗑'; font-size: 22px; }

      /* Hint: row below action buttons */
      #hint {
        top: 90px; font-size: 11px;
        padding: 5px 12px;
        max-width: calc(100vw - 32px);
        overflow: hidden; text-overflow: ellipsis;
      }

      /* Canvas: below HUD so scene isn't hidden behind controls */
      #c { top: 88px; }

      /* Room panel: anchored below HUD */
      #roompanel { top: 90px; max-width: calc(100vw - 32px); }

      /* Rename modal: anchor near top so keyboard doesn't cover it */
      #renameModal { align-items: flex-start; padding-top: 72px; }

      /* Color row: wrap on narrow screens */
      #colorrow {
        left: 16px; right: 16px;
        transform: none; max-width: none;
        flex-wrap: wrap; justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="bg">
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="blob b3"></div><div class="blob b4"></div><div class="blob b5"></div>
  </div>
  <div id="vig"></div>
  <div id="c"></div>
  <div id="tabs">
    <button class="tab active" data-room="1">Kamer 1</button>
    <button class="tab" data-room="2">Kamer 2</button>
    <button class="tab" data-room="3">Kamer 3</button>
  </div>
  <div id="hint">Selecteer een meubel hieronder ↓</div>
  <button id="undo">↩ Undo</button>
  <button id="roomBtn">🏠 Kamer</button>
  <button id="rot">↻ Roteer</button>
  <button id="dup">📋 Dupl</button>
  <button id="del">🗑 Verwijder</button>
  <div id="roompanel"></div>
  <div id="colorrow"></div>
  <div id="inv"></div>
  <div id="err">Three.js kon niet laden.<br>Gebruik: <code>npx serve .</code></div>
  <div id="renameModal">
    <div id="renameBox">
      <div id="renameTitle">Naam voor Kamer 1</div>
      <input id="renameInput" type="text" maxlength="18" autocomplete="off" spellcheck="false" />
      <div id="renameBtns">
        <button id="renameCancel">Annuleren</button>
        <button id="renameConfirm">Opslaan</button>
      </div>
    </div>
  </div>

  <script src="js/three.min.js" onerror="document.getElementById('err').style.display='block'"></script>
  <script src="js/audio.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/placement.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/input.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
